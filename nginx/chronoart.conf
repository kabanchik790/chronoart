server {
    listen 80;
    server_name chronoart.ru www.chronoart.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chronoart.ru www.chronoart.ru;

    # Сертификаты выпущены через Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/chronoart.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chronoart.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/chronoart;
    index index.html;

    gzip on;
    gzip_types text/plain application/javascript application/json text/css;

    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Фотографии проектов из bind-mount папки
    location /uploads/projects/ {
        alias   /srv/chronoart/uploads/projects/;
        expires 30d;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
