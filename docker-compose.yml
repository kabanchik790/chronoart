version: '3.8'

services:
  app:
    build: ./src/server
    env_file: ./src/server/.env
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - sessions:/app/sessions
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chronoart}
      POSTGRES_USER: ${POSTGRES_USER:-chronoart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chronoart}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  sessions:
  uploads:
  pgdata:
